name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arc-days-1-3:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: arc-stack/package-lock.json

      - name: Install ARC dependencies
        run: npm ci --prefix arc-stack

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Verify ARC exchange
        run: npm run verify
